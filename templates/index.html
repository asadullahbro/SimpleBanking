<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleBanking Dashboard</title>
    <style>
        /* background gradient animation */
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Base styles */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: "Poppins", Arial, sans-serif;
            background: linear-gradient(135deg, #8f6bff, #5d34f5, #4f2ce4, #9a79ff);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            padding: 40px 20px 20px;
            animation: fadeIn 1.6s;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 700;
            margin: 0;
        }

        .header p {
            margin-top: 10px;
            font-size: 17px;
            opacity: 0.8;
        }

        /* Dashboard */
        .dashboard {
            margin: 20px auto;
            width: 90%;
            max-width: 500px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: float 3s ease-in-out infinite;
        }

        /* Welcome message */
        .welcoming {
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            animation: fadeIn 1s ease-out;
        }

        /* Button grid */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        /* Buttons */
        button {
            background: rgba(255, 255, 255, 0.85);
            color: #4a2bd6;
            padding: 16px 20px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            background: white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .logout {
            background: rgba(255, 100, 100, 0.2);
            color: white;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .logout:hover {
            background: rgba(255, 100, 100, 0.3);
        }

        /* Balance display */
        .balance-display {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .balance-label {
            opacity: 0.8;
            font-size: 14px;
        }

        /* Recent transactions */
        .transactions {
            margin-top: 20px;
            text-align: left;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        .transaction-amount.positive {
            color: #4ade80;
        }

        .transaction-amount.negative {
            color: #f87171;
        }

        /* Footer */
        .footer {
            padding: 20px;
            font-size: 14px;
            opacity: 0.7;
            animation: fadeIn 2s;
            margin-top: auto;
        }

        /* Modal for transactions */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            animation: fadeIn 0.3s ease-out;
        }

        .modal input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 32px;
            }
            
            .dashboard {
                padding: 25px 20px;
                margin: 10px;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .balance-amount {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to SimpleBanking</h1>
        <p>Your trusted partner in managing your finances.</p>
    </div>
    
    <div class="dashboard">
        <div class="welcoming"></div>
        
        <div class="balance-display">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount">$---</div>
        </div>
        
        <div class="button-grid">
            <button class="view_balance" onclick="getBalance()">View Balance</button>
            <button class="deposit" onclick="showDepositModal()">Deposit</button>
            <button class="withdraw" onclick="showWithdrawModal()">Withdraw</button>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>Deposit Funds</h3>
            <input type="number" id="depositAmount" placeholder="Enter amount" min="0" step="0.01">
            <div class="modal-buttons">
                <button onclick="hideModal('depositModal')">Cancel</button>
                <button onclick="processDeposit()" style="background: #4ade80; color: white;">Deposit</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Withdraw Funds</h3>
            <input type="number" id="withdrawAmount" placeholder="Enter amount" min="0" step="0.01">
            <div class="modal-buttons">
                <button onclick="hideModal('withdrawModal')">Cancel</button>
                <button onclick="processWithdraw()" style="background: #f87171; color: white;">Withdraw</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 SimpleBanking. All rights reserved.</p>
    </div>

    <script>
        // Authentication check
        let authenticated = localStorage.getItem('access_token') !== null;
        if (!authenticated){
            window.location.href = 'login.html';
        }

        // Welcome message
        const welcome = document.querySelector('.welcoming');
        const username = localStorage.getItem('username') || 'User';
        welcome.textContent = `Hello, ${username}! Welcome back to your dashboard.`;

        // Modal functions
        function showDepositModal() {
            document.getElementById('depositModal').style.display = 'flex';
            document.getElementById('depositAmount').focus();
        }

        function showWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'flex';
            document.getElementById('withdrawAmount').focus();
        }

        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.getElementById(modalId.replace('Modal', 'Amount')).value = '';
        }

        // Logout function
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }

        // Banking functions
        async function getBalance() {
            try {
                const res = await fetch('http://127.0.0.1:8000/balance', {
                    headers: {
                        "Authorization": "Bearer " + localStorage.getItem('access_token')
                    }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.querySelector('.balance-amount').textContent = '$' + data.balance;
                    showMessage('Balance updated successfully!', 'success');
                } else {
                    showMessage('Failed to retrieve balance. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error fetching balance:', error);
                showMessage('An error occurred. Please try again later.', 'error');
            }
        }

        async function processDeposit() {
            const amount = document.getElementById('depositAmount').value;
            const currentToken = localStorage.getItem('access_token');
            
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }

            try {
                const form = new FormData();
                form.append('amount', amount);
                
                const response = await fetch('http://127.0.0.1:8000/deposit', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + currentToken
                    },
                    body: form
                });
                
                if (response.ok) {
                    const data = await response.json();
                    hideModal('depositModal');
                    showMessage(`Deposit successful! New balance: $${data.new_balance}`, 'success');
                    // Refresh balance display
                    getBalance();
                } else {
                    showMessage('Deposit failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error during deposit:', error);
                showMessage('An error occurred. Please try again later.', 'error');
            }
        }

        async function processWithdraw() {
            const amount = document.getElementById('withdrawAmount').value;
            const currentToken = localStorage.getItem('access_token');
            
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }

            try {
                const form = new FormData();
                form.append('amount', amount);
                
                const response = await fetch('http://127.0.0.1:8000/withdraw', {
                    method: 'POST',
                    headers: {
                        "Authorization": 'Bearer ' + currentToken
                    },
                    body: form
                });
                
                if (response.ok) {
                    const data = await response.json();
                    hideModal('withdrawModal');
                    showMessage(`Withdrawal successful! New balance: $${data.new_balance}`, 'success');
                    // Refresh balance display
                    getBalance();
                } else {
                    showMessage('Withdrawal failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error during withdrawal:', error);
                showMessage('An error occurred. Please try again later.', 'error');
            }
        }

        // Utility function to show messages
        function showMessage(message, type) {
            // Create toast notification
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: 500;
                z-index: 10000;
                animation: fadeIn 0.3s ease-out;
                background: ${type === 'success' ? 'rgba(74, 222, 128, 0.9)' : 'rgba(248, 113, 113, 0.9)'};
                backdrop-filter: blur(10px);
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 4000);
        }

        // Load balance on page load
        document.addEventListener('DOMContentLoaded', function() {
            getBalance();
        });
    </script>
</body>
</html>
